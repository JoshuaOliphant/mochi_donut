[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --import-mode=importlib
    --cov=src/mochi_donut
    --cov-report=term-missing
    --cov-fail-under=100
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
