<div class="bg-white dark:bg-gray-800 shadow rounded-lg overflow-hidden hover:shadow-lg transition-shadow">
    <div class="p-6">
        <div class="flex items-start justify-between">
            <div class="flex-1">
                <!-- Question -->
                <h3 class="text-lg font-medium text-gray-900 dark:text-gray-100 mb-2">
                    {{ prompt.question }}
                </h3>
                <!-- Answer Preview -->
                <p class="text-sm text-gray-600 dark:text-gray-400 mb-4 line-clamp-2">
                    {{ prompt.answer }}
                </p>
            </div>
            <!-- Quality Badge -->
            <div class="ml-4">
                {% include "components/quality_badge.html" %}
            </div>
        </div>

        <!-- Footer -->
        <div class="flex items-center justify-between mt-4 pt-4 border-t border-gray-200 dark:border-gray-700">
            <div class="flex items-center space-x-2">
                <!-- Status Badge -->
                <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium
                    {% if prompt.status == 'approved' %}bg-green-100 text-green-800 dark:bg-green-900 dark:text-green-200
                    {% elif prompt.status == 'rejected' %}bg-red-100 text-red-800 dark:bg-red-900 dark:text-red-200
                    {% else %}bg-yellow-100 text-yellow-800 dark:bg-yellow-900 dark:text-yellow-200{% endif %}">
                    {{ prompt.status }}
                </span>
                <!-- Timestamp -->
                <span class="text-xs text-gray-500 dark:text-gray-400">
                    {{ prompt.created_at.strftime('%Y-%m-%d %H:%M') }}
                </span>
            </div>

            <!-- Actions -->
            <div class="flex items-center space-x-2">
                <a href="/prompts/{{ prompt.workflow_id }}/{{ prompt.id }}"
                   class="inline-flex items-center px-3 py-1.5 border border-gray-300 dark:border-gray-600 rounded-md text-xs font-medium text-gray-700 dark:text-gray-300 bg-white dark:bg-gray-800 hover:bg-gray-50 dark:hover:bg-gray-700">
                    Review
                </a>
                <button
                    hx-post="/prompts/{{ prompt.workflow_id }}/{{ prompt.id }}/approve"
                    hx-swap="none"
                    class="inline-flex items-center px-3 py-1.5 border border-transparent rounded-md text-xs font-medium text-white bg-green-600 hover:bg-green-700">
                    Approve
                </button>
            </div>
        </div>
    </div>
</div>
