<div id="prompt-content" class="bg-white dark:bg-gray-800 shadow rounded-lg overflow-hidden">
    <div class="px-4 py-5 sm:p-6">
        <form
            hx-put="/prompts/{{ prompt.workflow_id }}/{{ prompt.id }}"
            hx-target="#prompt-content"
            hx-swap="outerHTML"
            class="space-y-4">

            <!-- Question Field -->
            <div>
                <label for="question" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                    Question
                </label>
                <textarea
                    id="question"
                    name="question"
                    rows="3"
                    required
                    class="block w-full rounded-md border-gray-300 dark:border-gray-600 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 dark:bg-gray-700 dark:text-gray-100 sm:text-sm"
                >{{ prompt.question }}</textarea>
                <p class="mt-1 text-xs text-gray-500 dark:text-gray-400">
                    Make the question focused and specific
                </p>
            </div>

            <!-- Answer Field -->
            <div>
                <label for="answer" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                    Answer
                </label>
                <textarea
                    id="answer"
                    name="answer"
                    rows="5"
                    required
                    class="block w-full rounded-md border-gray-300 dark:border-gray-600 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 dark:bg-gray-700 dark:text-gray-100 sm:text-sm"
                >{{ prompt.answer }}</textarea>
                <p class="mt-1 text-xs text-gray-500 dark:text-gray-400">
                    Provide a precise and unambiguous answer
                </p>
            </div>

            <!-- Action Buttons -->
            <div class="flex items-center justify-end space-x-3 pt-4 border-t border-gray-200 dark:border-gray-700">
                <button
                    type="button"
                    hx-get="/prompts/{{ prompt.workflow_id }}/{{ prompt.id }}/cancel-edit"
                    hx-target="#prompt-content"
                    hx-swap="outerHTML"
                    class="inline-flex items-center px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-md shadow-sm text-sm font-medium text-gray-700 dark:text-gray-300 bg-white dark:bg-gray-800 hover:bg-gray-50 dark:hover:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                    Cancel
                </button>
                <button
                    type="submit"
                    class="inline-flex items-center px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                    <svg class="h-4 w-4 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                    </svg>
                    Save Changes
                </button>
            </div>
        </form>
    </div>
</div>
