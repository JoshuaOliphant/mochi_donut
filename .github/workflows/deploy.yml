name: Deploy to Fly.io

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

jobs:
  test:
    name: Test Application
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: mochi_donut_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install uv
      run: pip install uv

    - name: Install dependencies
      run: uv sync --frozen

    - name: Run linting
      run: |
        uv run ruff check .
        uv run ruff format --check .

    - name: Run type checking
      run: uv run mypy src/

    - name: Run security scan
      run: uv run bandit -r src/

    - name: Set up test environment
      env:
        DATABASE_URL: postgresql://test_user:test_password@localhost:5432/mochi_donut_test
        REDIS_URL: redis://localhost:6379/0
        SECRET_KEY: test-secret-key-for-ci
        ENVIRONMENT: testing
      run: |
        uv run python -m alembic upgrade head

    - name: Run tests
      env:
        DATABASE_URL: postgresql://test_user:test_password@localhost:5432/mochi_donut_test
        REDIS_URL: redis://localhost:6379/0
        SECRET_KEY: test-secret-key-for-ci
        ENVIRONMENT: testing
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        MOCHI_API_KEY: ${{ secrets.MOCHI_API_KEY }}
      run: |
        uv run pytest \
          --cov=src \
          --cov-report=xml \
          --cov-report=html \
          --cov-fail-under=80 \
          -v

    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      if: always()
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        tags: mochi-donut:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Test Docker image
      run: |
        docker run --rm -d --name test-container -p 8080:8080 \
          -e ENVIRONMENT=testing \
          -e SECRET_KEY=test-secret \
          -e DATABASE_URL=sqlite+aiosqlite:///./test.db \
          mochi-donut:latest

        # Wait for container to start
        sleep 30

        # Test health endpoint
        curl -f http://localhost:8080/health || exit 1

        # Clean up
        docker stop test-container

  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.ref == 'refs/heads/main'

    environment:
      name: production
      url: https://mochi-donut.fly.dev

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Fly CLI
      uses: superfly/flyctl-actions/setup-flyctl@master

    - name: Deploy to Fly.io
      env:
        FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      run: |
        flyctl deploy --remote-only --wait-timeout 600

    - name: Health check after deployment
      run: |
        # Wait for deployment to stabilize
        sleep 60

        # Check health endpoint
        curl -f https://mochi-donut.fly.dev/health || exit 1

        # Check detailed health
        curl -f https://mochi-donut.fly.dev/health/detailed || exit 1

    - name: Notify deployment success
      if: success()
      run: |
        echo "✅ Deployment successful!"
        echo "🚀 Application available at: https://mochi-donut.fly.dev"

    - name: Rollback on failure
      if: failure()
      env:
        FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      run: |
        echo "❌ Deployment failed, initiating rollback..."
        flyctl releases list --app mochi-donut
        flyctl releases rollback --app mochi-donut

  notify:
    name: Notify Status
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always() && github.ref == 'refs/heads/main'

    steps:
    - name: Notify success
      if: needs.deploy.result == 'success'
      run: |
        echo "🎉 Mochi Donut deployed successfully!"
        echo "📊 Monitoring: https://fly.io/apps/mochi-donut/monitoring"
        echo "📜 Logs: https://fly.io/apps/mochi-donut/monitoring"

    - name: Notify failure
      if: needs.deploy.result == 'failure'
      run: |
        echo "💥 Deployment failed!"
        echo "🔍 Check logs: https://fly.io/apps/mochi-donut/monitoring"